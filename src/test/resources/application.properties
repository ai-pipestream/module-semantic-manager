# Test configuration for semantic-manager module
quarkus.test.profile=test
quarkus.http.port=0
quarkus.http.test-port=0
quarkus.application.name=semantic-manager-test

# Run gRPC on the same server as HTTP (mock services run in-process)
quarkus.grpc.server.use-separate-server=false

# Static Stork discovery — mock chunker and embedder run in-process on the test server
stork.chunker-service.service-discovery.type=static
stork.chunker-service.service-discovery.address-list=${quarkus.http.host:localhost}:${quarkus.http.test-port}

stork.embedder-service.service-discovery.type=static
stork.embedder-service.service-discovery.address-list=${quarkus.http.host:localhost}:${quarkus.http.test-port}

# Disable pipestream registration for tests
pipestream.registration.enabled=false
pipestream.registration.retry.max-attempts=0
pipestream.registration.re-registration.enabled=false
pipestream.registration.health-check.enabled=false

# Logging
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG
