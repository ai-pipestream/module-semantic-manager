name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch, minor, major)'
        required: true
        default: 'patch'

jobs:
  release:
    uses: ai-pipestream/.github/.github/workflows/reusable-release.yml@main
    with:
      release-type: ${{ inputs.release_type }}
    secrets: inherit
